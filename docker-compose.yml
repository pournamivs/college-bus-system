version: '3.8'

services:
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://trackmybus:password@db:5432/trackmybus
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=production_secret_key_change_me
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app

  db:
    image: postgis/postgis:15-3.3
    environment:
      - POSTGRES_USER=trackmybus
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=trackmybus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackmybus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
